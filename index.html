<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>QM47</title>
<style>html,body{margin:0;padding:0;background:#fff}#root{min-height:100vh}#boot{display:flex;align-items:center;justify-content:center;min-height:100vh;color:#e23b4e;font-family:system-ui;font-weight:700;letter-spacing:.05em;font-size:18px}</style>
</head>
<body>
<div id="root"><div id="boot">QM yükleniyor…</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.1/tesseract.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useMemo,useRef,useCallback}=React;

/* ========== CSS ========== */
const CSS=`
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#fff;--bg2:#f5f7fb;--panel:#fff;--panel2:#eef1f7;
--line:#e4e8f0;--line2:#cfd6e2;
--ink:#0e1726;--muted:#51607a;--faint:#8a97ad;
--orange:#ef6606;--orange-s:rgba(239,102,6,.12);
--green:#0f9d63;--green-s:rgba(15,157,99,.13);
--amber:#b3810a;--amber-s:rgba(179,129,10,.15);
--red:#e23b4e;--red-s:rgba(226,59,78,.11);
--azure:#1f7ae0;
}
body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}

/* layout */
.shell{display:flex;min-height:100vh}
.sidebar{position:sticky;top:0;width:248px;flex-shrink:0;height:100vh;overflow-y:auto;background:#f6f8fc;border-right:1px solid var(--line);display:flex;flex-direction:column;padding:16px 12px}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 14px;margin-bottom:6px;border-bottom:1px solid var(--line)}
.brand .dot{width:11px;height:11px;border-radius:50%;background:var(--red);box-shadow:0 0 0 4px var(--red-s)}
.qm-name{font-family:'Space Grotesk';font-size:19px;font-weight:700;letter-spacing:.02em;color:var(--red);text-transform:uppercase}
.qm-sub{font-size:11px;color:var(--faint);font-weight:500}
.lang-btn{margin-left:auto;font-size:12px;font-weight:700;letter-spacing:.05em;padding:6px 12px;border-radius:8px;border:2px solid var(--orange);background:var(--orange-s);color:var(--orange);cursor:pointer;transition:.13s;white-space:nowrap}
.lang-btn:hover{background:var(--orange);color:#fff}
.sh{font-family:'JetBrains Mono';font-size:10.5px;letter-spacing:.16em;color:var(--faint);padding:14px 10px 8px}
.sl{display:flex;flex-direction:column;gap:3px;flex:1;overflow-y:auto}
.si{display:flex;align-items:center;gap:9px;width:100%;text-align:left;padding:9px 10px;border-radius:9px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;transition:.12s;font-size:13px}
.si:hover{background:var(--panel2);color:var(--ink)}
.si.on{background:var(--orange-s);border-color:var(--orange);color:var(--ink);box-shadow:inset 3px 0 0 var(--orange)}
.si.on .ic{background:var(--orange);color:#fff}
.ic{width:20px;height:20px;border-radius:5px;background:var(--line2);color:var(--ink);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;font-size:11px;flex-shrink:0}
.sn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:700;color:var(--red);font-family:'Space Grotesk';font-size:13.5px}
.sb{font-family:'JetBrains Mono';font-size:11px;font-weight:700;min-width:20px;height:20px;padding:0 6px;border-radius:999px;background:var(--line2);color:var(--ink);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb.red{background:var(--red);color:#fff}
.sa{margin-top:8px;width:100%;text-align:left;padding:9px 10px;border-radius:9px;border:1px dashed var(--line2);background:transparent;color:var(--faint);cursor:pointer;font-size:12.5px;font-family:'Space Grotesk';font-weight:600}
.sa:hover{color:var(--ink);border-color:var(--faint)}
.sf{display:flex;gap:8px;align-items:center;padding-top:12px;margin-top:8px;border-top:1px solid var(--line)}
.main{flex:1;min-width:0;padding:0 28px 80px}

/* hero & tabs */
.hero{display:flex;align-items:flex-end;gap:14px;margin:20px 0 2px;flex-wrap:wrap}
.mk{font-family:'Space Grotesk';font-size:26px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;background:linear-gradient(90deg,var(--orange),var(--amber) 60%,var(--green));-webkit-background-clip:text;background-clip:text;color:transparent}
.store{font-family:'JetBrains Mono';font-size:12.5px;color:var(--azure);border:1px solid var(--line2);background:rgba(31,122,224,.08);padding:5px 12px;border-radius:999px}
.tabs{display:flex;gap:8px;margin:14px 0 4px;border-bottom:1px solid var(--line);overflow-x:auto;flex-wrap:nowrap}
.tabs button{font-family:'Space Grotesk';font-size:11px;font-weight:800;letter-spacing:.01em;padding:9px 12px;border:none;background:transparent;color:#111;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.13s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;flex:none}
.tabs button:hover{color:#000}
.tabs button.on{color:var(--orange);border-bottom-color:var(--orange)}
.tabs button .tl{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:4px;background:#fff;color:var(--red);border:1.5px solid var(--red);font-family:'JetBrains Mono';font-size:10px;font-weight:800;flex:none}
.tabs button.on .tl{background:#fff;color:var(--red)}
.tabs button:not(.on) .tl{background:#fff;color:var(--red)}

/* command */
.cmd{margin:18px 0;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:linear-gradient(135deg,#eef3ff 0%,#f6f8fc 55%,#fdf1e9 100%)}
.cmd-h{padding:18px 22px 4px;display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px}
.ey{font-family:'JetBrains Mono';font-size:11px;letter-spacing:.16em;color:var(--orange);text-transform:uppercase}
.cmd-d{font-family:'JetBrains Mono';font-size:12px;color:var(--faint)}
.cmd-l{padding:6px 22px 18px;font-family:'Space Grotesk';font-size:20px;font-weight:600;line-height:1.35}
.ctags{display:flex;gap:10px;flex-wrap:wrap;padding:0 22px 20px}
.ctag{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:11px;font-family:'JetBrains Mono';font-size:13px;border:1px solid transparent}
.ctag .n{font-weight:700;font-size:16px}
.ctag.r{background:var(--red-s);color:var(--red);border-color:rgba(226,59,78,.25)}
.ctag.a{background:var(--amber-s);color:var(--amber);border-color:rgba(179,129,10,.25)}
.ctag.g{background:var(--green-s);color:var(--green);border-color:rgba(15,157,99,.25)}

/* rules */
.rules{border:1px solid var(--line);border-radius:13px;padding:14px 16px;margin-bottom:18px;background:var(--panel)}
.rh{font-family:'Space Grotesk';font-size:13px;font-weight:600;display:flex;align-items:center;gap:9px;margin-bottom:8px}
.fbul{display:flex;gap:8px;align-items:baseline;font-size:12px;color:var(--muted);line-height:1.45}
.fbul>span:first-child{font-size:10px;flex-shrink:0;line-height:1.6}
.rules-grid{display:grid;grid-template-columns:1fr;gap:10px}
.rule{display:flex;align-items:center;gap:12px;padding:14px 18px;border:1px solid var(--line2);border-radius:12px;background:var(--bg2);font-size:15px;white-space:nowrap}
.rule.off{opacity:.5}
.rule b{color:var(--red);font-weight:700}
.rule .num{font-family:'Space Grotesk';color:var(--orange);font-size:12px;font-weight:700;letter-spacing:.06em;flex-shrink:0}
.ri{width:60px;background:var(--panel);border:1px solid var(--line2);border-radius:7px;color:var(--ink);font-family:'JetBrains Mono';font-size:14px;text-align:center;padding:6px 6px;margin:0 4px}
.sw{width:32px;height:18px;border-radius:999px;background:var(--line2);border:none;position:relative;cursor:pointer;transition:.15s;flex-shrink:0;padding:0}
.sw.on{background:var(--green)}
.sw .kn{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.sw.on .kn{left:16px}
@media(max-width:900px){.rules-grid{grid-template-columns:1fr}}

/* kpis */
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:15px 16px;position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--azure)}
.kpi:nth-child(2)::before{background:var(--green)}
.kpi:nth-child(3)::before{background:var(--orange)}
.kpi:nth-child(4)::before{background:var(--amber)}
.kpi:nth-child(5)::before{background:var(--red)}
.kpi .lab{font-size:11.5px;color:var(--muted);font-weight:500;margin-bottom:9px}
.kpi .val{font-family:'JetBrains Mono';font-size:22px;font-weight:700;letter-spacing:-.02em}
.kpi .sub{font-family:'JetBrains Mono';font-size:11px;color:var(--faint);margin-top:4px}
.pos{color:var(--green)}.neg{color:var(--red)}

/* section heads, buttons */
.sec{display:flex;align-items:center;justify-content:space-between;margin:26px 0 12px;gap:12px;flex-wrap:wrap}
.sec h2{font-family:'Space Grotesk';font-size:15px;font-weight:600;display:flex;align-items:center;gap:9px}
.sec h2 .bar{width:3px;height:15px;background:var(--orange);border-radius:2px}
.btn{font-family:'Space Grotesk';font-size:13px;font-weight:600;padding:8px 14px;border-radius:9px;border:1px solid var(--line2);background:var(--panel);color:var(--ink);cursor:pointer;transition:.13s}
.btn:hover{border-color:var(--faint)}
.btn.pri{background:var(--orange);border-color:var(--orange);color:#fff}
.btn.pri:hover{filter:brightness(1.07)}
.btn.ghost{background:transparent}
.btn:disabled{opacity:.6;cursor:wait}
.brow{display:flex;gap:9px;flex-wrap:wrap}
.cur-sel{background:var(--panel);border:1px solid var(--line2);color:var(--ink);font-family:'JetBrains Mono';font-size:12px;padding:6px 8px;border-radius:8px;cursor:pointer}
.icon-btn{background:var(--panel);border:1px solid var(--line2);color:var(--muted);width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.icon-btn:hover{color:var(--ink);border-color:var(--faint)}

/* dropzone */
.dz{margin-bottom:16px;border:3px dashed var(--red);border-radius:13px;padding:22px;text-align:center;color:var(--ink);font-size:14px;cursor:pointer;transition:.13s;background:#fff9e6}
.dz:hover{border-color:var(--red);background:#fff3cc;color:var(--ink)}
.dz.over{border-color:var(--orange);background:#ffe8a3;color:var(--ink)}
.dz b{color:var(--azure);font-weight:600}
.dz .big{font-family:'Space Grotesk';font-size:15px;font-weight:600;color:var(--ink);margin-bottom:4px}
.etsy-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:14px 16px;border:1px solid var(--line);border-radius:13px 13px 0 0;background:var(--bg2);border-bottom:none}
.etsy-bar .ef{font-family:'Inter';font-size:12.5px;padding:7px 14px;border-radius:999px;border:1px solid var(--line2);background:var(--panel);color:var(--ink);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px}
.etsy-bar .ef:hover{border-color:var(--faint)}
.etsy-bar .ef select{border:none;background:transparent;color:var(--ink);font-family:'Inter';font-size:12.5px;cursor:pointer;outline:none;-webkit-appearance:none;appearance:none;padding-right:2px}
.etsy-bar .efspc{flex:1}
.etsy-bar .efsrch{font-family:'Inter';font-size:12.5px;padding:7px 12px;border-radius:999px;border:1px solid var(--line2);background:var(--panel);color:var(--ink);width:180px}
.etsy-bar .efsrch:focus{outline:none;border-color:var(--orange)}
.tw.ntr{border-radius:0 0 13px 13px}

/* paste */
.pb{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:16px;margin-bottom:16px}
.pb textarea{width:100%;min-height:120px;resize:vertical;background:var(--bg2);border:1px solid var(--line2);border-radius:9px;padding:12px;color:var(--ink);font-family:'JetBrains Mono';font-size:12.5px;line-height:1.6}
.pb textarea:focus{outline:none;border-color:var(--orange)}
.ph{font-size:12px;color:var(--muted);margin:10px 0 12px;line-height:1.6}
.ph code{font-family:'JetBrains Mono';background:var(--panel2);padding:2px 6px;border-radius:5px;color:var(--orange);font-size:11.5px}

/* table */
.tw{border:1px solid var(--line);border-radius:13px;overflow:auto;background:var(--panel);margin-bottom:8px}
table{width:auto;border-collapse:collapse;min-width:auto}
thead th{font-family:'JetBrains Mono';font-size:10.5px;letter-spacing:.03em;text-transform:uppercase;color:var(--faint);text-align:right;padding:9px 10px;border-bottom:1px solid var(--line2);white-space:nowrap;font-weight:700}
thead th.l{text-align:left}
tbody td{padding:7px 10px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--bg2)}
.ci{background:transparent;border:1px solid transparent;border-radius:7px;color:var(--ink);font-family:'JetBrains Mono';font-size:13px;text-align:right;width:84px;padding:6px 8px;transition:.1s}
.ci:hover{border-color:var(--line2)}
.ci:focus{outline:none;border-color:var(--orange);background:var(--bg2)}
.ci.nm{text-align:left;width:180px;font-family:'Inter';font-weight:500}
.calc{font-family:'JetBrains Mono';font-size:11.5px;color:var(--ink);font-weight:700}
.calc.s{color:var(--ink);font-weight:500}
.vd{font-family:'JetBrains Mono';font-size:11px;font-weight:700;letter-spacing:.04em;padding:5px 9px;border-radius:7px;display:inline-block;white-space:nowrap}
.vd.r{background:var(--red-s);color:var(--red)}
.vd.a{background:var(--amber-s);color:var(--amber)}
.vd.g{background:var(--green-s);color:var(--green)}
.vd.m{background:var(--panel2);color:var(--faint)}
.dl{background:transparent;border:none;color:var(--faint);cursor:pointer;font-size:15px;padding:4px;line-height:1}
.dl:hover{color:var(--red)}
.rr td{padding:0 12px 11px;border-bottom:1px solid var(--line);text-align:left}
.rs{font-size:12px;color:var(--muted);line-height:1.5;display:flex;gap:7px;align-items:flex-start}
.rs .tk{color:var(--orange);font-family:'JetBrains Mono'}
.empty{padding:46px 20px;text-align:center;color:var(--faint)}
.empty p{font-size:13.5px;line-height:1.6}
.empty .big{font-family:'Space Grotesk';font-size:16px;color:var(--muted);margin-bottom:6px;font-weight:600}

/* budget */
.bgt{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:20px 22px}
.bgt .bh{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
.bgt .bw{font-family:'JetBrains Mono';font-size:28px;font-weight:700;color:var(--red);letter-spacing:-.02em}
.bgt .bh small{font-size:12.5px;color:var(--muted)}
.ml{display:flex;flex-direction:column;gap:9px}
.mv{display:flex;align-items:center;gap:12px;font-size:13px;padding:10px 13px;background:var(--bg2);border-radius:9px;border:1px solid var(--line)}
.mv .fr{color:var(--red);font-family:'JetBrains Mono';font-size:12px}
.mv .ar{color:var(--faint)}
.mv .to{color:var(--green);font-weight:600;flex:1}
.mv .am{font-family:'JetBrains Mono';color:var(--ink);font-weight:600}

/* history */
.hist{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.hist .hl{font-size:12px;color:var(--faint);margin-right:4px}
.hist .hc{font-family:'JetBrains Mono';font-size:12px;padding:6px 11px;border-radius:8px;border:1px solid var(--line2);background:var(--panel);color:var(--muted);cursor:pointer;transition:.12s}
.hist .hc:hover{color:var(--ink)}
.hist .hc.on{border-color:var(--orange);color:var(--orange)}

/* busy / err */
.busy{display:flex;align-items:center;gap:11px;background:var(--orange-s);border:1px solid rgba(239,102,6,.3);color:var(--orange);font-size:13px;padding:13px 16px;border-radius:11px;margin-bottom:16px;font-weight:500}
.busy .sp{width:15px;height:15px;border:2px solid rgba(239,102,6,.35);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:var(--red-s);border:1px solid rgba(226,59,78,.3);color:var(--red);font-size:12.5px;padding:12px 15px;border-radius:11px;margin-bottom:16px;line-height:1.5}

/* modal */
.ov{position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(3px);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
.mod{background:var(--bg);border:1px solid var(--line2);border-radius:18px;width:100%;max-width:440px;padding:26px;max-height:90vh;overflow:auto}
.mod h3{font-family:'Space Grotesk';font-size:17px;font-weight:700;margin-bottom:5px}
.mod .desc{font-size:12.5px;color:var(--muted);margin-bottom:20px;line-height:1.6}
.fld{margin-bottom:17px}
.fld label{display:block;font-size:12.5px;font-weight:500;margin-bottom:4px}
.fld .ht{font-size:11.5px;color:var(--faint);margin-bottom:8px;line-height:1.5}
.fld input{width:100%;background:var(--bg2);border:1px solid var(--line2);border-radius:9px;padding:10px 12px;color:var(--ink);font-family:'JetBrains Mono';font-size:14px}
.fld input:focus{outline:none;border-color:var(--orange)}
.ma{display:flex;gap:10px;margin-top:8px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:60;background:var(--panel2);border:1px solid var(--line2);color:var(--ink);padding:11px 18px;border-radius:11px;font-size:13px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.12);font-family:'Space Grotesk'}

/* note */
.note{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:13px 16px;font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:14px}
.note b{color:var(--ink)}

/* gmail */
.gsetup{max-width:560px;margin:40px auto;text-align:center}
.gsetup .gico{font-size:48px;margin-bottom:12px}
.gsetup .gti{font-family:'Space Grotesk';font-size:22px;font-weight:700;margin-bottom:10px}
.gsetup .gde{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:24px}
.gst{margin-top:32px;text-align:left;background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:18px 20px}
.gst .sh2{font-family:'Space Grotesk';font-size:13px;font-weight:700;color:var(--faint);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px}
.gst .stp{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:7px;padding-left:4px}
.gst a{color:var(--azure);text-decoration:none}
.gst a:hover{text-decoration:underline}
.gst code{font-family:'JetBrains Mono';background:var(--panel);padding:2px 7px;border-radius:5px;font-size:12px;color:var(--orange)}
.gcid{margin-top:18px;border-top:1px solid var(--line);padding-top:16px;display:flex;flex-direction:column;gap:8px}
.gcid label{font-size:12.5px;font-weight:600}
.gcid input{width:100%;background:var(--panel);border:1px solid var(--line2);border-radius:9px;padding:10px 12px;color:var(--ink);font-family:'JetBrains Mono';font-size:13px}
.gcid input:focus{outline:none;border-color:var(--orange)}
.gbar{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--line);margin-bottom:4px;flex-wrap:wrap}
.gbar .gw{font-family:'JetBrains Mono';font-size:13px;font-weight:600}

@media(max-width:760px){.shell{flex-direction:column}.sidebar{position:static;width:100%;height:auto;border-right:none;border-bottom:1px solid var(--line)}.sl{flex-direction:row;flex-wrap:wrap;overflow:visible}.si{width:auto}.main{padding:0 16px 60px}}
`;

/* ========== HELPERS ========== */
const todayISO=()=>new Date().toISOString().slice(0,10);
const TR_MONTHS=["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
const EN_MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];

function parseCSVLine(line){const out=[];let cur="",q=false;for(let i=0;i<line.length;i++){const c=line[i];if(q){if(c==='"'){if(line[i+1]==='"'){cur+='"';i++}else q=false}else cur+=c}else{if(c==='"')q=true;else if(c===","){out.push(cur);cur=""}else cur+=c}}out.push(cur);return out}
function parseBlock(lines){
const rows=[];let pend="";
const numK=v=>{v=String(v||"").replace(/[$₺,%\s]/g,"");let mul=1;if(/k$/i.test(v)){mul=1000;v=v.replace(/k$/i,"");}else if(/m$/i.test(v)){mul=1e6;v=v.replace(/m$/i,"");}const n=parseFloat(v);return isNaN(n)?0:n*mul;};
const bad=/^(advertising status|efficient spending|shop manager|dashboard|listings?|search|orders?|settings|marketing|apps|help|finances|messages|stats|policy|customer service|what.?s roas|return on|views|clicks|strategy|ad on|section|advertised|turn ads|select strategy|compare|last \d+ days|this month|show \d+|sales|social|offsite|etsy ads|molly|previous period|\.)/i;
for(const ln of lines){
const c=parseCSVLine(ln);const a=(c[0]||"").trim();
const isMetrics=c.length>=7&&/^[\d.,]+k?m?$/i.test((c[0]||"").replace(/\s/g,""))&&/%/.test(c[2]||"")&&/[\d$]/.test(c[4]||"")&&/[\d$]/.test(c[5]||"");
if(isMetrics&&pend){rows.push({id:Math.random().toString(36).slice(2),name:pend,impressions:String(numK(c[0])),clicks:String(numK(c[1])),orders:String(numK(c[3])),revenue:String(numK(c[4])),spend:String(numK(c[5]))});pend="";continue;}
if(a.length>=18&&/[a-zA-ZğüşıöçĞÜŞİÖÇ]{4,}/.test(a)&&!bad.test(a)&&c.slice(1).every(x=>!(x||"").trim()))pend=a;
}

function detectMonth(text){
const M={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
const cy=new Date().getFullYear();
let best=null,bestY=cy,partial=null,partialY=cy;
const re=/([A-Za-z]{3})[a-z]*\s+(\d{1,2})(?:,?\s*(\d{4}))?\s*[-–—]\s*([A-Za-z]{3})[a-z]*\s+(\d{1,2})(?:,?\s*(\d{4}))?/g;let m;
while((m=re.exec(text))){const a=M[m[1].toLowerCase()],b=M[m[4].toLowerCase()],d1=+m[2],d2=+m[5];if(a==null||b==null)continue;const yr=(+m[6])||(+m[3])||cy;if(a===b){if(d1<=2&&d2>=27){best=a;bestY=yr;}else if(partial==null){partial=a;partialY=yr;}}}
if(best!=null)return bestY+"-"+String(best+1).padStart(2,"0");
if(partial!=null)return partialY+"-"+String(partial+1).padStart(2,"0");
return null;}
function parseCSV(text){
const lines=text.split(/\r?\n/).filter(l=>l.trim().length);
if(lines.length<2)return[];
const hdr=parseCSVLine(lines[0]).map(h=>h.trim().toLowerCase());
const find=(re,ex)=>hdr.findIndex(h=>re.test(h)&&(!ex||!ex.test(h)));
const iName=find(/listing|title|item|product|name/);
const iImp=find(/view|impression/);
const iClk=find(/click/,/rate|ctr|%/);
const iRev=find(/revenue|sales|order value|order amount|order total/);
const iOrd=find(/order/,/value|amount|revenue|total/);
const iSpend=find(/spend|cost|budget/);
let iN2=iName;if(iN2<0){const used=new Set([iImp,iClk,iRev,iOrd,iSpend]);const sample=parseCSVLine(lines[1]||"");const isDate=v=>/\b(19|20)\d{2}\b/.test(v)||/^\s*\d{1,2}[\/.\- ]/.test(v)||/(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec|ocak|şubat|mart|nisan|mayıs|haziran|temmuz|ağustos|eylül|ekim|kasım|aralık)/i.test(v);for(let i=0;i<hdr.length;i++){if(used.has(i))continue;const v=(sample[i]||"").trim();if(v&&v.length>=4&&/[a-zA-ZğüşıöçĞÜŞİÖÇ]{3,}/.test(v)&&!isDate(v)){iN2=i;break;}}}
const out=[];
for(let r=1;r<lines.length;r++){
const c=parseCSVLine(lines[r]);if(!c.length)continue;
const g=i=>i>=0&&i<c.length?c[i]:"";
const name=String(g(iN2)||"").trim();
if(/^(total|grand total|sum|toplam)/i.test(name))continue;
const o={id:Math.random().toString(36).slice(2),name:name||"Listing",impressions:String(toNum(g(iImp))),clicks:String(toNum(g(iClk))),spend:String(toNum(g(iSpend))),orders:String(toNum(g(iOrd))),revenue:String(toNum(g(iRev)))};
if(o.name==="Listing"&&!toNum(o.impressions)&&!toNum(o.spend)&&!toNum(o.revenue))continue;
out.push(o)}
const blk=parseBlock(lines);const nb=blk.filter(o=>o.name&&o.name!=="Listing").length;const no=out.filter(o=>o.name&&o.name!=="Listing"&&(toNum(o.impressions)||toNum(o.spend)||toNum(o.revenue))).length;if(nb>=2&&nb>=no)return blk;
return out}

function evaluate(r,s){
const imp=toNum(r.impressions),clk=toNum(r.clicks),spend=toNum(r.spend),ord=toNum(r.orders),rev=toNum(r.revenue);
const ctr=imp?clk/imp:0,cpc=clk?spend/clk:0,conv=clk?ord/clk:0,roas=spend?rev/spend:0,acos=rev?spend/rev:(spend>0?Infinity:0),net=rev-spend;
const _minImp=(s.enMinImp===false)?0:(toNum(s.minImp)||1000),_minClk=(s.enMinClk===false)?0:(toNum(s.minClicks)||30);
if(imp<_minImp&&clk<_minClk)return{imp,clk,spend,ord,rev,ctr,cpc,conv,roas,acos,net,verdict:"VERİ AZ",tone:"muted",reason:`Yeterli veri yok — en az ${numFmt(_minImp)} gösterim veya ${_minClk} tıklama biriksin.`};
const R=s.rules||[];
const AOVv=ord?rev/ord:0,CPAv=ord?spend/ord:0;
const RDEF={roas_lt:{lo:1,hi:2,dir:1,v:roas},conv_lt:{lo:1,hi:2,dir:1,v:conv*100},ctr_fix:{lo:0.5,hi:1,dir:1,v:ctr*100},acos_gt:{lo:25,hi:40,dir:-1,v:acos*100},cpc_gt:{lo:0.3,hi:0.6,dir:-1,v:cpc},cpa_gt:{lo:5,hi:10,dir:-1,v:CPAv},ord_lt:{lo:1,hi:3,dir:1,v:ord},rev_lt:{lo:20,hi:50,dir:1,v:rev},spend_gte:{lo:20,hi:50,dir:-1,v:spend},imp_no_clk:{lo:500,hi:1000,dir:1,v:imp},aov_lt:{lo:15,hi:25,dir:1,v:AOVv}};
let worst=null,wr=null;
if(Array.isArray(R))for(const rule of R){if(!rule.on)continue;const D=RDEF[rule.type];if(!D)continue;const lo=(rule.lo!=null&&rule.lo!=="")?toNum(rule.lo):D.lo,hi=(rule.hi!=null&&rule.hi!=="")?toNum(rule.hi):D.hi,v=D.v;let z;if(D.dir>0)z=(v<lo?0:v<hi?1:2);else z=(v>hi?0:v>lo?1:2);if(worst==null||z<worst){worst=z;wr={type:rule.type,v,lo,hi};}}
if(spend>0&&rev<=0)return{imp,clk,spend,ord,rev,ctr,cpc,conv,roas,acos,net,verdict:"KAPAT",tone:"red",reason:`${money(spend,s.cur)} harcandı, 0 satış — kapat.`};
if(worst!=null){const verdict=worst===0?"KAPAT":worst===1?"İZLE":"BÜYÜT";const tone=worst===0?"red":worst===1?"amber":"green";const zt=worst===0?"KAPAT aralığında":worst===1?"BEKLE aralığında":"AÇ aralığında";return{imp,clk,spend,ord,rev,ctr,cpc,conv,roas,acos,net,verdict,tone,reason:`${wr.type}: ${Math.round(wr.v*100)/100} → ${zt} (alt ${wr.lo} · üst ${wr.hi}).`};}
let verdict="VERİ AZ",tone="muted",reason="";
const _mClk=(s.enMinClk===false)?0:s.minClicks,_mSpend=(s.enMinSpend===false)?0:s.minSpend;
if(clk<_mClk&&spend<_mSpend){reason=`Sadece ${numFmt(clk)} tıklama / ${money(spend,s.cur)} harcama. En az ${s.minClicks} tıklama biriksin.`}
else if(spend>0&&rev<=0){verdict="KAPAT";tone="red";reason=`${money(spend,s.cur)} harcandı, 0 satış — kapat.`}
else if(s.enWatch!==false&&roas<s.watchRoas){verdict="KAPAT";tone="red";reason=`ROAS ${roas.toFixed(2)}× — alt sınırın (${s.watchRoas}×) altında.`}
else if(s.enTarget!==false&&roas<s.targetRoas){verdict="İZLE";tone="amber";reason=`ROAS ${roas.toFixed(2)}× — hedefin altında ama sınırda. İzle.`}
else{verdict="BÜYÜT";tone="green";reason=`ROAS ${roas.toFixed(2)}× — kârlı. Bütçe artır.`}
return{imp,clk,spend,ord,rev,ctr,cpc,conv,roas,acos,net,verdict,tone,reason}}

function categorize(listings){
const map={};

for(const c of CATS){
if(c.kw.test(nm)){
if(!map[c.key])map[c.key]={category:c.label,listings:[],totalViews:0,keyword:""};
map[c.key].listings.push(r.name);
map[c.key].totalViews+=toNum(r.impressions);
const kws=nm.match(c.kw);
if(kws&&kws[0])map[c.key].keyword=kws[0];
found=true;break}}
if(!found){
if(!map["other"])map["other"]={category:"Other",listings:[],totalViews:0,keyword:""};
map["other"].listings.push(r.name);map["other"].totalViews+=toNum(r.impressions)}}
return Object.values(map).map(g=>({
id:Math.random().toString(36).slice(2),
name:g.listings.length+" listing ("+g.listings[0].slice(0,30)+"…)",
category:g.category,
keyword:g.keyword,
views:String(g.totalViews),
position:"",
note:g.listings.length>1?g.listings.length+t.listInTopic:"",
}))}

<div className="fbul"><span style={{color:"var(--green)"}}>●</span><span><b style={{color:"var(--ink)"}}>%50 altı</b> → İYİ, <b style={{color:"var(--green)"}}>aç / büyüt</b></span></div>
<div className="fbul"><span style={{color:"var(--amber)"}}>●</span><span><b style={{color:"var(--ink)"}}>%50–%100 arası</b> → sınırda, <b style={{color:"var(--amber)"}}>izle</b></span></div>
<div className="fbul"><span style={{color:"var(--red)"}}>●</span><span><b style={{color:"var(--ink)"}}>%100 üstü</b> → zayıf (satıştan çok harcıyor), <b style={{color:"var(--red)"}}>kapat</b></span></div>
</div>
</div>
</div>
</div>

<div className="rules" style={{marginBottom:14,background:"linear-gradient(135deg,#eef3ff 0%,#fdf1e9 100%)"}}>
<div className="rh"><span className="bar" style={{width:3,height:15,background:"var(--azure)",borderRadius:2,display:"inline-block"}}/><span style={{fontSize:16,letterSpacing:".03em"}}>{t.rThreshHead}</span></div>
<div style={{fontSize:13,color:"var(--muted)",margin:"2px 0 12px",lineHeight:1.5}}>Bir reklam bu kadar <b>gösterim VEYA tıklama</b> biriktirmeden hiçbir karar verilmez ("Veri az" der).</div>
<div style={{display:"flex",gap:18,flexWrap:"wrap",alignItems:"center"}}>
<label style={{display:"flex",alignItems:"center",gap:8,fontSize:15,fontWeight:600}}>En az gösterim <input className="ri" style={{width:80}} value={settings.minImp||""} onChange={e=>setSettings(s=>({...s,minImp:e.target.value}))}/></label>
<label style={{display:"flex",alignItems:"center",gap:8,fontSize:15,fontWeight:600}}>En az tıklama <input className="ri" style={{width:70}} value={settings.minClicks||""} onChange={e=>setSettings(s=>({...s,minClicks:e.target.value}))}/></label>
</div>
</div>

<div className="rules">
<div className="rh"><span className="bar" style={{width:3,height:15,background:"var(--orange)",borderRadius:2,display:"inline-block"}}/><span style={{fontSize:16,letterSpacing:".03em"}}>{t.rDecHead}</span><span style={{marginLeft:"auto",fontFamily:"'JetBrains Mono'",fontSize:11,color:"var(--faint)"}}>{(settings.rules||[]).filter(r=>r.on).length}/{(settings.rules||[]).length} {t.rOpen}</span></div>
<div style={{display:"flex",flexDirection:"column",gap:10,marginTop:8}}>
{(settings.rules||[]).map((rule,i)=>{const rt=RULE_TYPES.find(t=>t.type===rule.type);const unit=rt&&rt.unit==="cur"?settings.cur:rt?rt.unit:"";const fix=/DÜZELT/.test(rule.label);return(
<div key={rule.id} style={{display:"flex",alignItems:"center",gap:13,padding:"12px 14px",border:"1px solid "+(rule.on?"var(--line2)":"var(--line)"),borderRadius:12,background:rule.on?"var(--bg2)":"var(--panel2)",opacity:rule.on?1:.6,flexWrap:"wrap"}}>
<button className={"sw"+(rule.on?" on":"")} onClick={()=>upRule(rule.id,{on:!rule.on})} style={{flexShrink:0}}><span className="kn"/></button>
<span className="num" style={{flexShrink:0}}>{i+1}.</span>
<span style={{flex:1,fontSize:15,minWidth:170}}>{rule.label.split(/→.*/)[0].split("X").map((part,j,arr)=>j<arr.length-1?<React.Fragment key={j}>{part}<input className="ri" value={rule.n} onChange={e=>upRule(rule.id,{n:e.target.value})}/>{unit?<span style={{fontSize:12,color:"var(--faint)"}}>{unit} </span>:null}</React.Fragment>:part)}</span>
<span className={"vd "+(fix?"a":"r")} style={{flexShrink:0}}>→ {fix?"DÜZELT":"KAPAT"}</span>
<button className="dl" onClick={()=>delRule(rule.id)} title="Kuralı sil">✕</button>
</div>)})}
</div>
<div style={{display:"flex",gap:8,alignItems:"center",marginTop:14,paddingTop:14,borderTop:"1px solid var(--line)"}}>
<select className="cur-sel" id="newrule" defaultValue="" style={{flex:1,fontSize:13}}>
<option value="" disabled>{t.rAddRule}</option>
{RULE_TYPES.map(rt=><option key={rt.type} value={rt.type}>{rt.label}</option>)}
</select>
<button className="btn pri" onClick={()=>{const sel=document.getElementById("newrule");if(sel.value){addRule(sel.value);sel.value=""}}}>{t.rAdd}</button>
</div>
</div>

<div className="rules" style={{marginTop:14}}>
<div className="rh"><span className="bar" style={{width:3,height:15,background:"var(--amber)",borderRadius:2,display:"inline-block"}}/><span style={{fontSize:16,letterSpacing:".03em"}}>{t.rFixHead}</span></div>
<div style={{fontSize:13,color:"var(--muted)",margin:"2px 0 12px",lineHeight:1.5}}>Bir reklam DÜZELT'e düşünce olası sebebi aç/kapat ile işaretle:</div>
<div style={{display:"flex",flexDirection:"column",gap:9}}>
{(settings.dzChecks||[]).map(c=>(
<div key={c.id} style={{display:"flex",alignItems:"center",gap:13,padding:"11px 14px",border:"1px solid var(--line2)",borderRadius:12,background:c.on?"var(--amber-s)":"var(--panel2)",opacity:c.on?1:.62}}>
<button className={"sw"+(c.on?" on":"")} onClick={()=>toggleDz(c.id)} style={{flexShrink:0}}><span className="kn"/></button>
<span style={{flex:1,fontSize:14}}>{c.label}</span>
{c.close&&<button onClick={()=>toggleDz(c.id)} style={{flexShrink:0,fontFamily:"'JetBrains Mono'",fontSize:11.5,fontWeight:700,letterSpacing:".04em",padding:"6px 13px",borderRadius:8,border:"1px solid var(--red)",background:c.on?"var(--red)":"var(--red-s)",color:c.on?"#fff":"var(--red)",cursor:"pointer"}}>{c.on?"✓ KAPATILDI":"KAPAT"}</button>}
</div>))}
</div>
</div>

<div className="rules" style={{marginTop:14}}>
<div className="rh"><span className="bar" style={{width:3,height:15,background:"var(--faint)",borderRadius:2,display:"inline-block"}}/><span style={{fontSize:16,letterSpacing:".03em"}}>{t.rCtrHead}</span></div>
<ul style={{listStyle:"none",padding:0,margin:"4px 0 0",display:"flex",flexDirection:"column",gap:9}}>
<li style={{display:"flex",gap:10,alignItems:"baseline",fontSize:13.5,color:"var(--muted)",lineHeight:1.5}}><span style={{color:"var(--amber)",fontWeight:800,flexShrink:0}}>1</span><span><b style={{color:"var(--ink)"}}>1000 gösterimde 5'ten az tıklama</b> → GÖRSEL + BAŞLIK DÜZELT <span style={{color:"var(--faint)",fontSize:12}}>(CTR %0,5 altı)</span></span></li>
<li style={{display:"flex",gap:10,alignItems:"baseline",fontSize:13.5,color:"var(--muted)",lineHeight:1.5}}><span style={{color:"var(--amber)",fontWeight:800,flexShrink:0}}>2</span><span><b style={{color:"var(--ink)"}}>2000 gösterimde 10'dan az tıklama</b> → ANA FOTOĞRAFI DEĞİŞTİR <span style={{color:"var(--faint)",fontSize:12}}>(kesin sorun)</span></span></li>
<li style={{display:"flex",gap:10,alignItems:"baseline",fontSize:13.5,color:"var(--muted)",lineHeight:1.5}}><span style={{color:"var(--green)",fontWeight:800,flexShrink:0}}>✓</span><span>İyi referans: <b style={{color:"var(--ink)"}}>1000 gösterimde ~20 tıklama</b> <span style={{color:"var(--faint)",fontSize:12}}>(CTR %2)</span></span></li>
</ul>
<div className="rf">CTR düşük = tıklama yok = para gitmiyor → <b>asla kapatma, sadece görsel/başlık düzelt.</b></div>
</div>

</div>)}

{tab==="agent"&&(
<div style={{padding:"8px 0 60px"}}>
<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}><span style={{fontFamily:"'Space Grotesk'",fontSize:15,fontWeight:700,color:"var(--red)",letterSpacing:".03em"}}>{t.agMine}</span><span className="mono" style={{fontSize:11,color:"var(--faint)"}}>{AGENTS.length} {t.agCount}</span></div>
<div style={{fontSize:12.5,color:"var(--muted)",marginBottom:18,lineHeight:1.6}}>{t.agIntro}</div>
<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
{AGENTS.map(a=>(
<div key={a.id} style={{background:"var(--panel)",border:"1px solid var(--line)",borderRadius:16,padding:"16px 16px 14px",position:"relative",overflow:"hidden"}}>
<div style={{position:"absolute",left:0,top:0,bottom:0,width:4,background:a.color}}/>
<div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:12}}>
<div style={{width:36,height:36,borderRadius:9,background:a.color,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{a.icon}</div>
<div style={{flex:1}}><div style={{fontFamily:"'Space Grotesk'",fontSize:16,fontWeight:700,lineHeight:1.2}}>{a.name}</div><div className="mono" style={{fontSize:10,color:"var(--faint)",marginTop:3}}>{a.id}</div></div>
<span style={{fontSize:10,fontWeight:700,padding:"4px 9px",borderRadius:999,textTransform:"uppercase",letterSpacing:".04em",background:a.status==="on"?"var(--green-s)":"var(--amber-s)",color:a.status==="on"?"var(--green)":"var(--amber)"}}>{a.status==="on"?t.agActive:t.agDraft}</span>
</div>
<div style={{display:"flex",alignItems:"center",gap:8,background:"var(--azure-s)",border:"1px solid rgba(31,122,224,.2)",color:"var(--azure)",borderRadius:9,padding:"7px 10px",fontSize:12.5,fontWeight:600,marginBottom:12}}>⏱ {a.schedule}</div>
<div className="mono" style={{fontSize:9.5,letterSpacing:".14em",color:"var(--faint)",textTransform:"uppercase",marginBottom:7}}>{t.agTodo}</div>
<ul style={{listStyle:"none",display:"flex",flexDirection:"column",gap:6,padding:0,margin:0}}>
{a.todo.map((td,i)=><li key={i} style={{display:"flex",gap:8,fontSize:12.5,color:"var(--muted)",lineHeight:1.4}}><span style={{color:"var(--orange)",fontWeight:800}}>›</span><span>{td}</span></li>)}
</ul>
</div>))}
<div style={{border:"2px dashed var(--line2)",borderRadius:16,minHeight:180,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,color:"var(--faint)",fontFamily:"'Space Grotesk'",fontWeight:600,fontSize:14}}><span style={{fontSize:32}}>+</span>{t.agNew}</div>
</div>
</div>)}

{tab==="dikkat"&&(
<div style={{padding:"8px 0 60px"}}>
<div className="note" style={{marginBottom:16,fontSize:13,lineHeight:1.6}}>{t.dkNote}</div>
<div className="rules">
<div className="rh"><span className="bar" style={{width:3,height:15,background:"var(--red)",borderRadius:2,display:"inline-block"}}/><span style={{fontSize:16,letterSpacing:".03em"}}>{t.dkHead}</span><span style={{marginLeft:"auto",fontFamily:"'JetBrains Mono'",fontSize:11,color:"var(--faint)"}}>{(settings.warnings||[]).length} {t.dkCount}</span></div>
<div style={{display:"flex",flexDirection:"column",gap:10,marginTop:8}}>
{(settings.warnings||[]).map((w,i)=>(
<div key={w.id} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px 14px",border:"1px solid var(--line2)",borderRadius:12,background:"var(--bg2)"}}>
<span style={{fontFamily:"'Space Grotesk'",fontWeight:700,color:"var(--red)",fontSize:15,flexShrink:0,marginTop:8}}>{i+1}.</span>
<textarea value={w.text} placeholder={t.dkPh} onChange={e=>upWarn(w.id,e.target.value)} style={{flex:1,minHeight:46,resize:"vertical",background:"var(--panel)",border:"1px solid var(--line2)",borderRadius:9,padding:"10px 12px",color:"var(--ink)",fontFamily:"'Inter'",fontSize:14,lineHeight:1.55}}/>
<button className="dl" onClick={()=>delWarn(w.id)} title={t.dkDel} style={{marginTop:8}}>✕</button>
</div>))}
{(settings.warnings||[]).length===0&&<div className="empty"><p>{t.dkEmpty}</p></div>}
</div>
<div style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--line)"}}>
<button className="btn pri" onClick={addWarn}>{t.dkAdd}</button>
</div>
</div>
</div>)}

</main>
</div>

{/* SETTINGS */}
{showSet&&<div className="ov" onClick={()=>setShowSet(false)}><div className="mod" onClick={e=>e.stopPropagation()}>
<h3>Ayarlar</h3><p className="desc">Kapat/izle/büyüt kararları bu eşiklere göre verilir.</p>
<NF label="Hedef ROAS (BÜYÜT)" hint="Üstündeki → bütçe artır." v={settings.targetRoas} set={v=>setSettings(s=>({...s,targetRoas:v}))} step={.1}/>
<NF label="Alt ROAS (KAPAT)" hint="Altındaki → kapat." v={settings.watchRoas} set={v=>setSettings(s=>({...s,watchRoas:v}))} step={.1}/>
<NF label="Min tıklama" hint="Bu birikene kadar 'veri az'." v={settings.minClicks} set={v=>setSettings(s=>({...s,minClicks:v}))} step={1}/>
<NF label={`Min harcama (${settings.cur})`} hint="Bu kadar harcamada 0 satış → kapat." v={settings.minSpend} set={v=>setSettings(s=>({...s,minSpend:v}))} step={1}/>
<div className="fld"><label>Anthropic API anahtarı (opsiyonel)</label><div className="ht">Görüntü okuma için. Tarayıcıda kalır.</div>
<input type="password" placeholder="sk-ant-..." value={settings.apiKey||""} onChange={e=>setSettings(s=>({...s,apiKey:e.target.value}))}/></div>
<div className="fld"><label>Google Client ID (Gmail sekmesi için)</label><div className="ht">Gmail'e bağlanmak için Google Cloud Console'dan alınır.</div>
<input placeholder="xxxxxxxx.apps.googleusercontent.com" value={settings.googleClientId||""} onChange={e=>setSettings(s=>({...s,googleClientId:e.target.value}))}/></div>
<div className="ma"><button className="btn pri" onClick={()=>{setShowSet(false);flash("Kaydedildi.")}}>Tamam</button>
<button className="btn ghost" onClick={()=>setSettings(s=>({...DS,cur:s.cur,apiKey:s.apiKey,googleClientId:s.googleClientId}))}>Varsayılana dön</button></div>
</div></div>}

{toast&&<div className="toast">{toast}</div>}
</div>)}

function NF({label,hint,v,set,step}){return(<div className="fld"><label>{label}</label>{hint&&<div className="ht">{hint}</div>}<input type="number" step={step} value={v} onChange={e=>set(parseFloat(e.target.value)||0)}/></div>)}

function AuthGate(){
const[mode,setMode]=useState("login");const[email,setEmail]=useState("");const[pw,setPw]=useState("");
const[busy,setBusy]=useState(false);const[err,setErr]=useState("");const[info,setInfo]=useState("");
const submit=async e=>{e.preventDefault();setErr("");setInfo("");setBusy(true);
try{if(mode==="signup"){const{error}=await sb.auth.signUp({email,password:pw});if(error)throw error;setInfo("Kayıt oluşturuldu. Şimdi giriş yap.");setMode("login");}
else{const{error}=await sb.auth.signInWithPassword({email,password:pw});if(error)throw error;}}
catch(e2){setErr(e2.message||"Hata")}finally{setBusy(false)}};
return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"linear-gradient(135deg,#eef3ff,#fdf1e9)"}}>
<form onSubmit={submit} style={{background:"#fff",border:"1px solid #cfd6e2",borderRadius:18,width:"100%",maxWidth:400,padding:30}}>
<div style={{fontFamily:"'Space Grotesk'",fontSize:24,fontWeight:700,color:"#e23b4e",textTransform:"uppercase"}}>QM</div>
<div style={{fontSize:13,color:"#51607a",marginBottom:20}}>Etsy Marketing Paneli · {mode==="login"?"Giriş":"Kayıt"} · Ortak bulut</div>
{err&&<div style={{background:"rgba(226,59,78,.11)",color:"#e23b4e",padding:"10px 13px",borderRadius:10,fontSize:13,marginBottom:12}}>⚠ {err}</div>}
{info&&<div style={{background:"rgba(15,157,99,.13)",color:"#0f9d63",padding:"10px 13px",borderRadius:10,fontSize:13,marginBottom:12}}>{info}</div>}
<label style={{fontSize:12.5,fontWeight:600,display:"block",margin:"12px 0 5px"}}>E-posta</label>
<input type="email" value={email} onChange={e=>setEmail(e.target.value)} required style={{width:"100%",padding:"11px 12px",border:"1px solid #cfd6e2",borderRadius:9,fontFamily:"'JetBrains Mono'",fontSize:14}}/>
<label style={{fontSize:12.5,fontWeight:600,display:"block",margin:"12px 0 5px"}}>Şifre</label>
<input type="password" value={pw} onChange={e=>setPw(e.target.value)} required minLength={6} style={{width:"100%",padding:"11px 12px",border:"1px solid #cfd6e2",borderRadius:9,fontFamily:"'JetBrains Mono'",fontSize:14}}/>
<button disabled={busy} style={{width:"100%",marginTop:20,padding:12,background:"#ef6606",color:"#fff",border:"none",borderRadius:9,fontFamily:"'Space Grotesk'",fontWeight:600,fontSize:14,cursor:"pointer"}}>{busy?"...":mode==="login"?"Giriş yap":"Kayıt ol"}</button>
<div style={{marginTop:16,textAlign:"center",fontSize:12.5,color:"#51607a"}}>{mode==="login"?<span>Hesabın yok mu? <button type="button" onClick={()=>{setMode("signup");setErr("")}} style={{background:"none",border:"none",color:"#1f7ae0",fontWeight:600,cursor:"pointer"}}>Kayıt ol</button></span>:<span>Zaten hesabın var mı? <button type="button" onClick={()=>{setMode("login");setErr("")}} style={{background:"none",border:"none",color:"#1f7ae0",fontWeight:600,cursor:"pointer"}}>Giriş yap</button></span>}</div>
</form></div>);}
function Root(){
const[session,setSession]=useState(undefined);
const[ready,setReady]=useState(false);
useEffect(()=>{sb.auth.getSession().then(({data})=>setSession(data.session));const{data:sub}=sb.auth.onAuthStateChange((_e,s)=>{currentAccountId=null;_shared=null;setReady(false);setSession(s)});return()=>sub.subscription.unsubscribe()},[]);
useEffect(()=>{let ok=true;if(session){bootstrap().then(()=>{if(ok)setReady(true)}).catch(()=>{if(ok)setReady(true)});}return()=>{ok=false}},[session]);
if(session===undefined)return <div id="boot">Yükleniyor…</div>;
if(!session)return <AuthGate/>;
if(!ready)return <div id="boot">Hesap hazırlanıyor…</div>;
return <App/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
